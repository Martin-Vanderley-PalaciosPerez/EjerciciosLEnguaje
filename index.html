<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dinamica</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 id="titulo">Selecciona el lenguaje en el que seas mejor</h1>

  <form id="formLenguajes" class="menu">
    <label><input type="checkbox" name="lenguaje" value="html"> HTML</label>
    <label><input type="checkbox" name="lenguaje" value="js"> JavaScript</label>
    <label><input type="checkbox" name="lenguaje" value="css"> CSS</label>
    <label><input type="checkbox" name="lenguaje" value="php"> PHP</label>
    <label><input type="checkbox" name="lenguaje" value="python"> Python</label>
    <button type="button" id="btnCargar">Cargar ejercicios</button>
  </form>

  <div id="contenedor"></div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <h2>Resultado Final</h2>
      <p id="resultado"></p>
      <button id="btnCerrar">Cerrar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
